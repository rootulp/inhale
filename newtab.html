<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>New Tab</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Name setup prompt (shown on first visit) -->
  <div id="setup" class="hidden">
    <div class="setup-container">
      <h1>Welcome to Inhale</h1>
      <p>What's your name?</p>
      <form id="name-form">
        <input type="text" id="name-input" placeholder="Enter your name" autocomplete="off" required>
        <button type="submit">Get Started</button>
      </form>
    </div>
  </div>

  <!-- Main content (shown after name is set) -->
  <div id="main" class="hidden">
    <div id="countdowns" class="countdowns"></div>
    <div class="content">
      <div id="clock" class="clock"></div>
      <div id="greeting" class="greeting"></div>
    </div>
    <div class="quote-container">
      <p id="quote" class="quote"></p>
      <p id="quote-author" class="quote-author"></p>
    </div>
    <button id="settings-btn" class="settings-btn" title="Settings">&#9881;</button>
  </div>

  <!-- Settings modal -->
  <div id="settings-overlay" class="settings-overlay hidden">
    <div class="settings-modal">
      <button id="settings-close" class="settings-close">&times;</button>
      <h2>Settings</h2>
      <h3>Countdowns</h3>
      <div id="countdowns-list" class="countdowns-list"></div>
      <form id="add-countdown-form" class="add-countdown-form">
        <input type="text" id="countdown-emoji" class="emoji-input" placeholder="😀" maxlength="2" title="Click then press Ctrl+Cmd+Space for emoji picker">
        <input type="text" id="countdown-label" placeholder="Label" required maxlength="20">
        <input type="date" id="countdown-date" required>
        <button type="submit">Add</button>
      </form>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
